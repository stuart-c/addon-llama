name: Update ik_llama.cpp SHA

on:
  schedule:
    - cron: '0 0 * * *' # Run daily at midnight
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  check-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Fetch Latest SHA
        id: fetch-sha
        run: |
          LATEST_SHA=$(curl -s https://api.github.com/repos/ikawrakow/ik_llama.cpp/commits/main | jq -r '.sha')
          echo "latest_sha=$LATEST_SHA" >> "$GITHUB_OUTPUT"

      - name: Read Current SHA
        id: read-sha
        run: |
          CURRENT_SHA=$(cat llama/ik_llama_sha | tr -d '[:space:]')
          echo "current_sha=$CURRENT_SHA" >> "$GITHUB_OUTPUT"

      - name: Update SHA File
        if: steps.fetch-sha.outputs.latest_sha != steps.read-sha.outputs.current_sha
        run: |
          echo "${{ steps.fetch-sha.outputs.latest_sha }}" > llama/ik_llama_sha

      - name: Create Pull Request
        if: steps.fetch-sha.outputs.latest_sha != steps.read-sha.outputs.current_sha
        uses: peter-evans/create-pull-request@dd475f3068299ee089c7dcbca5a7c880856059bc # v7.0.5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update ik_llama.cpp to ${{ steps.fetch-sha.outputs.latest_sha }}"
          branch: update-ik-llama-sha
          title: "chore: update ik_llama.cpp to ${{ steps.fetch-sha.outputs.latest_sha }}"
          body: |
            A new version of `ik_llama.cpp` has been detected.
            
            - **New SHA**: `${{ steps.fetch-sha.outputs.latest_sha }}`
            - **Previous SHA**: `${{ steps.read-sha.outputs.current_sha }}`
            
            This PR was automatically generated by the [Update ik_llama.cpp SHA](.github/workflows/update-sha.yaml) workflow.
          labels: |
            dependencies
            chore
