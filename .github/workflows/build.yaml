name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  release:
    types: [published]

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  prepare:
    name: Prepare Version
    if: 'github.event_name != ''push'' || !contains(github.event.head_commit.message, ''chore: bump addon version'')'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Initialise Version Metadata
        id: version
        run: |
          VERSION="${{ github.event.release.tag_name || github.event.pull_request.head.sha || github.sha }}"
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          else
            echo "tag=dev" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build Addon (aarch64)
    needs: prepare
    if: always() && (needs.prepare.result == 'success')
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: llama
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/addon-llama:${{ needs.prepare.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/addon-llama:${{ needs.prepare.outputs.tag }}
          build-args: |
            BUILD_FROM=ghcr.io/home-assistant/aarch64-base-debian:bookworm
            BUILD_ARCH=aarch64
            BUILD_VERSION=${{ needs.prepare.outputs.version }}
          outputs: ${{ github.event_name != 'pull_request' && 'type=image,compression=zstd,compression-level=9,force-compression=true' || '' }}
          cache-from: type=gha,scope=aarch64
          cache-to: type=gha,mode=max,scope=aarch64

  version:
    name: Bump Version
    needs: [prepare, build]
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: main

      - name: Update Addon Version and Changelog
        env:
          RELEASE_BODY: ${{ github.event.release.body }}
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          CHANGELOG="llama/CHANGELOG.md"
          DATE=$(date +'%Y-%m-%d')
          
          # Update version in config.yaml
          sed -i "s/^version:.*/version: \"$VERSION\"/" llama/config.yaml
          
          # Update CHANGELOG.md
          # If the file doesn't exist, we'll create it with a header
          if [ ! -f "$CHANGELOG" ]; then
            echo -e "# Changelog\n\nAll notable changes to this project will be documented in this file.\n" > "$CHANGELOG"
          fi
          
          # Find the line after the header (usually line 3 or 5 depending on initial content)
          # We'll just prepend after the first few lines if they match a pattern, or just prepend to the top if we can't find it.
          # Actually, the user asked for "top of the file". 
          # "Keep a Changelog" usually has a header. Prepending to the absolute top is simpler.
          
          printf "## [%s] - %s\n\n%s\n\n" "$VERSION" "$DATE" "$RELEASE_BODY" > "$CHANGELOG.tmp"
          cat "$CHANGELOG" >> "$CHANGELOG.tmp"
          mv "$CHANGELOG.tmp" "$CHANGELOG"
          
          # Commit changes
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add llama/config.yaml "$CHANGELOG"
          git commit -m "chore: bump addon version to $VERSION and update changelog"
          # Pull latest changes before pushing (safety rebase)
          git pull --rebase origin main
          git push origin HEAD:refs/heads/main

      - name: Generate GitHub App Token for Dispatch
        id: dispatch-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ha-addons

      - name: 🚀 Dispatch Repository Updater update signal
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
        with:
          token: ${{ steps.dispatch-token.outputs.token }}
          repository: stuart-c/ha-addons
          event-type: update
          client-payload: '{"app": "llama"}'
